Two Irishmen, Sean and Kevin, meet on the street, not having seen one another in many years. "Tell me now," says Sean, "did you ever marry?"

<p>
"Ah, yes," Kevin replies. "My wife's an angel."

<p>
"You're a lucky man," says Sean. "Mines's still with me.
